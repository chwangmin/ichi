# 로컬에서 백엔드만 gradlew bootRun 으로 띄울 때 쓰는 프로파일.
#   실행:  SPRING_PROFILES_ACTIVE=local ./gradlew bootRun
#   전제:  docker compose up -d db   (DB 컨테이너가 호스트 15432 로 노출돼 있어야 함)
#
# DB 는 Docker 의 PostgreSQL 컨테이너를 그대로 사용한다. 포트는 docker-compose 의
# db ports 매핑(15432:5432)과 일치해야 한다.
spring:
  datasource:
    url: jdbc:postgresql://localhost:15432/ichi
    username: ichi
    password: ichi_dev_pw

logging:
  level:
    com.ichi: debug
