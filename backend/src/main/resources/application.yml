spring:
  application:
    name: ichi

  # 로컬 bootRun 시 프로젝트 루트의 .env 를 읽는다(있으면). KEY=VALUE 형식이라 .properties 로 파싱.
  # 경로 후보: 백엔드에서 실행하면 ../.env, 루트에서 실행하면 .env.
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ichi}
    username: ${SPRING_DATASOURCE_USERNAME:ichi}
    password: ${SPRING_DATASOURCE_PASSWORD:ichi_dev_pw}

  jpa:
    hibernate:
      # 스키마는 Flyway가 관리. JPA는 검증만.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # 업로드 용량 제한. 파일 한 개 25MB, 요청 전체 30MB (env 로 조정 가능).
  # 초과 시 MaxUploadSizeExceededException → 413 한국어 메시지(EntryExceptionHandler).
  # nginx 엣지도 client_max_body_size 30m 로 같은 봉투를 받는다.
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:25MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:30MB}

server:
  port: 8080

# 애플리케이션 고유 설정 (M2~에서 사용)
ichi:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5173/auth/callback}
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:10080}
  # refresh_token 암호화 키(base64 32바이트). 비우면 개발 모드 평문 + 경고.
  token-enc-key: ${TOKEN_ENC_KEY:}
  cors:
    # CORS 허용 origin. 쉼표로 여러 개. 모바일(Capacitor)은 capacitor://localhost 등 추가.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  vworld:
    # VWorld Geocoder API 인증키. 프론트에 노출하지 않고 백엔드 프록시에서만 사용.
    api-key: ${VWORLD_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # DB 등 구성요소 상태를 함께 보여줌 (인증 없이도 노출 — 헬스체크용)
      show-details: always
      probes:
        enabled: true        # /actuator/health/liveness, /readiness 제공
  health:
    db:
      enabled: true

logging:
  level:
    org.flywaydb: info
