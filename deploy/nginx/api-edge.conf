# =========================================================================
#  API 엣지 nginx — 백엔드 전용 진입점. 블루그린 스위치 지점.
#    /api/    → active 색 백엔드 (upstream 은 active-upstream.conf 에서 정의)
#    /healthz → active 백엔드의 /actuator/health (NPM/모니터링용)
#
#  프론트(정적 SPA)는 이 엣지를 거치지 않는다 — NPM 이 도메인 / 를
#  frontend 컨테이너로 직접 프록시한다(프론트는 블루그린 대상이 아님).
#
#  active 색 전환: deploy/nginx/active-upstream.conf 를 blue/green 으로 교체 후
#                 docker exec ichi-api-edge nginx -s reload  (switch.sh 가 자동화)
# =========================================================================

# active 백엔드 upstream 정의(backend_active)는 별도 파일에서 include.
# conf.d 밖(/etc/nginx/)에 둬서 자동 include 와 중복되지 않게 한다.
# (switch.sh 가 이 파일 내용을 blue/green 으로 바꾼 뒤 nginx -s reload)
include /etc/nginx/active-upstream.conf;

server {
    listen 80;
    server_name _;

    # 업로드 봉투: 백엔드 multipart(요청 30MB)와 동일하게 맞춘다.
    # 이게 작으면 백엔드 413(한국어 메시지) 전에 nginx 가 413 으로 끊어버린다.
    client_max_body_size 30m;

    # API → active 색 백엔드
    location /api/ {
        proxy_pass http://backend_active;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 쿠키 세션 전달 그대로
        proxy_pass_request_headers on;
    }

    # 엣지 자체 헬스 (active 백엔드 health 를 그대로 노출)
    location = /healthz {
        proxy_pass http://backend_active/actuator/health;
    }
}
