# 프로덕션 정적 서빙 (prod 스테이지). SPA history 폴백 + /api 백엔드 프록시.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router(history 모드) 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드로 프록시 (compose 네트워크의 backend 서비스).
    #  - 단일 compose(개발/단순 prod): backend 서비스로 직접 프록시.
    #  - 블루그린 배포(deploy/): NPM 이 /api/ 를 api-edge 로 직접 보내므로
    #    프론트 컨테이너는 /api/ 를 받지 않는다 → 이 블록은 사용되지 않는다(폴백용 보존).
    # backend 가 없을 때도 nginx 가 기동되도록 resolver + 변수로 지연 해석.
    location /api/ {
        resolver 127.0.0.11 valid=10s;  # Docker 내장 DNS
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
